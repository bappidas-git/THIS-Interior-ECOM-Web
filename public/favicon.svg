<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="THIS Interiors">
  <!-- Brand mark derived from the light logo: the brass script "This" wordmark
       on a warm-charcoal tile (legible on both light and dark browser chrome). -->
  <rect width="512" height="512" rx="112" ry="112" fill="#1a1815"/>
  <rect x="16" y="16" width="480" height="480" rx="98" ry="98" fill="none"
        stroke="#c9a05a" stroke-opacity="0.3" stroke-width="3"/>
  <text x="256" y="266" text-anchor="middle" dominant-baseline="central"
        font-family="'Cormorant Garamond','Playfair Display',Georgia,'Times New Roman',serif"
        font-style="italic" font-weight="600" font-size="232"
        textLength="392" lengthAdjust="spacingAndGlyphs" fill="#c9a05a">This</text>
</svg>
