<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="%PUBLIC_URL%/logo192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f6f2ec" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1815" media="(prefers-color-scheme: dark)" />
    <meta

    <meta
      name="keywords"
      content="THIS Interiors, luxury home décor, interior design Dubai, vases, scented candles, wall art, mirrors, cushions, table lamps, planters, ceramics, decorative objects"
    />
    <meta name="author" content="THIS Interiors" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://thisinteriors.com/" />
    <meta property="og:site_name" content="THIS Interiors" />
    <meta
      property="og:title"
      content="THIS Interiors — Curated Home Décor"
    />
    <meta
      property="og:description"
      content="Crafting homes with a soul. A curated boutique of vases, candles, wall art, mirrors and more — from Dubai's luxury interior-design studio."
    />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://thisinteriors.com/" />
    <meta
      property="twitter:title"
      content="THIS Interiors — Curated Home Décor"
    />
    <meta
      property="twitter:description"
      content="Crafting homes with a soul. A curated boutique of vases, candles, wall art, mirrors and more — from Dubai's luxury interior-design studio."
    />
    <meta property="twitter:image" content="%PUBLIC_URL%/logo512.png" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Brand fonts: Cormorant Garamond (editorial display serif, incl. italic —
         the brand's accent device) + Inter (humanist UI/body sans). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Material Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />

    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>THIS Interiors — Curated Home Décor</title>

    <!-- Custom styles for loading screen -->
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans",
          "Helvetica Neue", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(180deg, #f6f2ec 0%, #fbf8f3 100%);
        min-height: 100vh;
      }

      /* Loading Screen Styles */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(160deg, #1a1815 0%, #211e1a 55%, #16130f 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
      }

      #loading-screen::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(ellipse at 20% 20%, rgba(201, 160, 90, 0.10) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 80%, rgba(184, 137, 60, 0.07) 0%, transparent 50%),
          radial-gradient(ellipse at 50% 50%, rgba(124, 85, 32, 0.05) 0%, transparent 70%);
        pointer-events: none;
      }

      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        position: relative;
        z-index: 1;
      }

      /* Brand Section */
      .loader-brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 48px;
      }

      .loader-wordmark {
        font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
        font-style: italic;
        font-weight: 500;
        font-size: 64px;
        line-height: 1;
        color: #c9a05a;
        margin-bottom: 14px;
        animation: logoFloat 3s ease-in-out infinite;
      }

      .loader-brand-name {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 8px;
        text-indent: 8px; /* balance the trailing letter-spacing */
        color: #f2ece2;
        margin-bottom: 12px;
      }

      .loader-tagline {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-style: italic;
        font-size: 15px;
        font-weight: 400;
        letter-spacing: 0.5px;
        color: rgba(242, 236, 226, 0.55);
      }

      /* Spinner Section */
      .loader-spinner-container {
        position: relative;
        width: 56px;
        height: 56px;
        margin-bottom: 32px;
      }

      .loader-spinner-track {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 2px solid rgba(201, 160, 90, 0.15);
        border-radius: 50%;
      }

      .loader-spinner {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 2px solid transparent;
        border-top-color: #c9a05a;
        border-right-color: #c9a05a;
        border-radius: 50%;
        animation: spinnerRotate 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      .loader-spinner-inner {
        position: absolute;
        top: 6px;
        left: 6px;
        right: 6px;
        bottom: 6px;
        border: 2px solid transparent;
        border-bottom-color: rgba(184, 137, 60, 0.55);
        border-left-color: rgba(184, 137, 60, 0.55);
        border-radius: 50%;
        animation: spinnerRotateReverse 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      .loader-spinner-dot {
        position: absolute;
        top: -3px;
        left: 50%;
        transform: translateX(-50%);
        width: 6px;
        height: 6px;
        background: #c9a05a;
        border-radius: 50%;
        box-shadow: 0 0 12px rgba(201, 160, 90, 0.7);
      }

      /* Loading Text */
      .loader-text-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .loader-text {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.9);
      }

      .loader-text span {
        display: inline-block;
        animation: textWave 1.5s ease-in-out infinite;
      }

      .loader-text span:nth-child(1) { animation-delay: 0s; }
      .loader-text span:nth-child(2) { animation-delay: 0.05s; }
      .loader-text span:nth-child(3) { animation-delay: 0.1s; }
      .loader-text span:nth-child(4) { animation-delay: 0.15s; }
      .loader-text span:nth-child(5) { animation-delay: 0.2s; }
      .loader-text span:nth-child(6) { animation-delay: 0.25s; }
      .loader-text span:nth-child(7) { animation-delay: 0.3s; }

      .loader-progress {
        width: 120px;
        height: 2px;
        background: rgba(201, 160, 90, 0.15);
        border-radius: 2px;
        overflow: hidden;
      }

      .loader-progress-bar {
        height: 100%;
        width: 30%;
        background: linear-gradient(90deg, #c9a05a 0%, #b0863f 100%);
        border-radius: 2px;
        animation: progressSlide 1.5s ease-in-out infinite;
      }

      /* Animations */
      @keyframes logoFloat {
        0%, 100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      @keyframes spinnerRotate {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes spinnerRotateReverse {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(-360deg);
        }
      }

      @keyframes textWave {
        0%, 100% {
          transform: translateY(0);
          opacity: 0.7;
        }
        50% {
          transform: translateY(-2px);
          opacity: 1;
        }
      }

      @keyframes progressSlide {
        0% {
          transform: translateX(-100%);
        }
        50% {
          transform: translateX(200%);
        }
        100% {
          transform: translateX(400%);
        }
      }

      /* Hide loading screen when React app loads */
      body.react-loaded #loading-screen {
        display: none;
      }

      /* Gradient background animation */
      @keyframes gradientShift {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      body {
        background-size: 200% 200%;
        animation: gradientShift 10s ease infinite;
      }

      /* Responsive adjustments */
      @media (max-width: 480px) {
        .loader-logo-wrapper {
          width: 64px;
          height: 64px;
        }

        .loader-logo-icon {
          width: 64px;
          height: 64px;
          border-radius: 16px;
        }

        .loader-logo-icon svg {
          width: 36px;
          height: 36px;
        }

        .loader-brand-name {
          font-size: 22px;
          letter-spacing: 2px;
        }

        .loader-tagline {
          font-size: 10px;
        }

        .loader-spinner-container {
          width: 48px;
          height: 48px;
        }

        .loader-text {
          font-size: 11px;
          letter-spacing: 3px;
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loader-container">
        <!-- Brand Section -->
        <div class="loader-brand">
          <div class="loader-wordmark">This</div>
          <div class="loader-brand-name">INTERIORS</div>
          <div class="loader-tagline">Crafting homes with a soul</div>
        </div>

        <!-- Spinner -->
        <div class="loader-spinner-container">
          <div class="loader-spinner-track"></div>
          <div class="loader-spinner">
            <div class="loader-spinner-dot"></div>
          </div>
          <div class="loader-spinner-inner"></div>
        </div>

        <!-- Loading Text -->
        <div class="loader-text-container">
          <div class="loader-text">
            <span>L</span><span>O</span><span>A</span><span>D</span><span>I</span><span>N</span><span>G</span>
          </div>
          <div class="loader-progress">
            <div class="loader-progress-bar"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.

    <script>
      // Theme detection and initial setup — applied BEFORE React mounts so the
      // first paint already has the correct theme (matches src/context/ThemeContext.js,
      // which keys CSS off body.dark / body.light). Avoids a flash of the wrong theme.
      (function () {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)"
        ).matches;
        var isDark = savedTheme === "dark" || (!savedTheme && prefersDark);

        document.body.classList.add(isDark ? "dark" : "light");
        document.body.style.background = isDark
          ? "linear-gradient(180deg, #1a1815 0%, #211e1a 100%)"
          : "linear-gradient(180deg, #f6f2ec 0%, #fbf8f3 100%)";
      })();

      // Hide the loading screen once React has mounted. React signals readiness
      // by adding the "react-loaded" class to <body> (see src/index.js). We watch
      // for that class instead of using a fixed delay, so the loader never fades
      // out before content is ready (no flash of unstyled content). A fallback
      // timeout guarantees the loader can never get permanently stuck visible.
      (function () {
        var hidden = false;
        function hideLoadingScreen() {
          if (hidden) return;
          hidden = true;
          document.body.classList.add("react-loaded");
          var loadingScreen = document.getElementById("loading-screen");
          if (loadingScreen) {
            loadingScreen.classList.add("fade-out");
            setTimeout(function () {
              loadingScreen.style.display = "none";
            }, 600);
          }
        }

        if (document.body.classList.contains("react-loaded")) {
          hideLoadingScreen();
        } else if (typeof MutationObserver !== "undefined") {
          var observer = new MutationObserver(function () {
            if (document.body.classList.contains("react-loaded")) {
              hideLoadingScreen();
              observer.disconnect();
            }
          });
          observer.observe(document.body, {
            attributes: true,
            attributeFilter: ["class"],
          });
        }

        // Safety net: never let the loader hang if React is slow or fails.
        setTimeout(hideLoadingScreen, 10000);
      })();
    </script>
  </body>
</html>
